version: "3.8"
services:
  postgres:
    image: postgres:latest
    container_name: grpc_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: grpcdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - grpc_network

volumes:
  postgres_data:

networks:
  grpc_network:
    driver: bridge
